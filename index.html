        <button class="bc-del" title="Delete session" onclick="delSession('${ds}',${si})">🗑</button>
      </div>
      <div class="bc-moves">`;
      const nblocks=(s.blocks||[]).length;
      (s.blocks||[]).forEach((b,bi)=>{
        if(b.type==='circuit'){
          const rounds=b.rounds||1;
          h+=`<div class="bc-circuit"><div class="bc-circuit-head"><div class="bcc-name" onclick="editCircuit('${ds}',${si},${bi})">⟳ ${escapeHTML(b.name||'Circuit')}</div><div class="bc-reorder">${reorderArrows(`moveBlock('${ds}',${si},${bi},-1)`,`moveBlock('${ds}',${si},${bi},1)`,bi>0,bi<nblocks-1)}<button class="bc-del" onclick="delBlock('${ds}',${si},${bi})">×</button></div></div>
            <div class="bcc-meta">${rounds} round${rounds===1?'':'s'}${b.restBetween?` · ${escapeHTML(b.restBetween)} rest between`:''}</div>
            <div class="bcc-moves">`;
          const nm=(b.moves||[]).length;
          (b.moves||[]).forEach((m,mi)=>{ h+=bcMoveHTML(ds,si,bi,mi,m,mi>0,mi<nm-1); });
          h+=`<button class="bc-add" onclick="openLibrary('${ds}',${si},false,${bi})">＋ Add to circuit</button></div></div>`;
        }else if(b.move){
          h+=bcMoveHTML(ds,si,bi,-1,b.move,bi>0,bi<nblocks-1);
        }
      });
      h+=`<div class="bc-add-row"><button class="bc-add" onclick="openLibrary('${ds}',${si})">＋ Add move</button><button class="bc-add circuit" onclick="addCircuit('${ds}',${si})">⟳ Add circuit</button></div></div></div>`;
    });
    h+=`<div class="bc-add-row"><button class="bc-add session" onclick="addSession('${ds}')">＋ Blank session</button><button class="bc-add tmpl" onclick="openTemplates('${ds}')">▤ From template</button></div>`;
  }
  const dirty=isDirty(ds);
  h+=`<button class="bc-save-day${dirty?' dirty':''}" onclick="saveDay('${ds}')">${dirty?'● Save day — unsaved changes':'Save day to plan'}</button>`;
  c.innerHTML=h;
}
/* up/down reorder control; arrows disable at the ends */
function reorderArrows(upCall,downCall,canUp,canDown){
  return `<span class="bc-arrows"><button class="bc-arrow" ${canUp?'':'disabled'} onclick="${canUp?upCall:''}">▲</button><button class="bc-arrow" ${canDown?'':'disabled'} onclick="${canDown?downCall:''}">▼</button></span>`;
}
/* one move card in the builder. mi=-1 means it's a standalone move-block;
   mi>=0 means it's the mi-th move inside circuit block bi.
   canUp/canDown gate the reorder arrows at the ends. */
function bcMoveHTML(ds,si,bi,mi,m,canUp,canDown){
  const up = mi<0 ? `moveBlock('${ds}',${si},${bi},-1)` : `moveCircuitMove('${ds}',${si},${bi},${mi},-1)`;
  const dn = mi<0 ? `moveBlock('${ds}',${si},${bi},1)`  : `moveCircuitMove('${ds}',${si},${bi},${mi},1)`;
  let h=`<div class="bc-move"><div class="bm-top"><div class="bm-name" onclick="editMove('${ds}',${si},${bi},${mi})">${escapeHTML(m.name)}</div><div class="bm-controls">${reorderArrows(up,dn,canUp,canDown)}<button class="bc-swap" onclick="swapMove('${ds}',${si},${bi},${mi})">swap</button><button class="bc-del" onclick="delMove('${ds}',${si},${bi},${mi})">×</button></div></div>
    <div class="bm-pills"><span class="bm-pill">${m.cat||'—'}</span>${isStrengthCat(m)?'<span class="bm-pill">tracked</span>':''}${m.video?'<span class="bm-pill">▶ video</span>':''}${m.desc?'<span class="bm-pill">✎ desc</span>':''}</div>`;
  if(m.desc)h+=`<div class="bm-desc" onclick="editMove('${ds}',${si},${bi},${mi})">${escapeHTML(m.desc)}</div>`;
  h+=`<div class="bm-spec" onclick="editMove('${ds}',${si},${bi},${mi})">${Object.entries(m.spec||{}).map(([k,v])=>k+': '+v).join(' · ')||'Tap to add details'}</div>`;
  if(isStrengthCat(m)){const carry=CARRY[m.name];
    if(carry&&(carry.last||carry.pr))h+=`<div class="carry"><div class="chip"><div class="lab">Last</div><div class="val">${carry.last||'—'}</div></div><div class="chip pr"><div class="lab">★ Best</div><div class="val">${carry.pr||'—'}</div></div></div>`;
    else h+=`<div class="carry"><div class="chip none"><div class="lab">History</div><div class="val">No prior log yet</div></div></div>`;
  }
  h+=`</div>`;
  return h;
}

/* templates */
function openTemplates(ds){
  if(!TEMPLATES.length){toast('No templates yet — build a day and save it as one later');}
  let inner=`<div class="modal-grab"></div><h3>Add from template</h3><div class="sub">Drops in all moves — edit or swap after</div>
    ${TEMPLATES.map(t=>{const mc=Array.isArray(t.blocks)?t.blocks.reduce((n,b)=>n+(b.type==='circuit'?(b.moves||[]).length:1),0):(t.moves||[]).length;return `<div class="lib-item" onclick="applyTemplate('${ds}','${esc(t.name)}')"><div><div class="li-name">${escapeHTML(t.name)}</div><div class="li-sub">${t.tag||''} · ${mc} moves</div></div><span class="li-type tt-strength">${t.tag||''}</span></div>`;}).join('')||'<div class="empty-hint">No templates saved.</div>'}`;
  document.getElementById('modalInner').innerHTML=inner;
  document.getElementById('modalBg').classList.add('show');
}
function applyTemplate(ds,name){
  const t=TEMPLATES.find(x=>x.name===name);if(!t)return;
  DRAFT[ds].sessions=DRAFT[ds].sessions||[];
  let blocks;
  if(Array.isArray(t.blocks)){
    // current templates carry full block objects (moves with their specs/desc intact)
    blocks=JSON.parse(JSON.stringify(t.blocks));
  }else{
    // legacy template: moves stored as names → rebuild from library as move-blocks
    blocks=(t.moves||[]).map(mn=>libClone(mn)).filter(Boolean).map(m=>({type:'move',move:m}));
  }
  DRAFT[ds].sessions.push({tag:t.tag||'AM',name:t.name,blocks});
  markDirty(ds);closeModal();toast('Added template — '+name);renderBuildCanvas();
}
function libClone(name){const l=LIBRARY.find(x=>x.name===name);return l?JSON.parse(JSON.stringify(l)):null;}

/* ── full template editing ─────────────────────────────────────────────────
   A template is one session {name,tag,blocks}. We load it into the builder
   under a reserved draft key and reuse ALL the day-builder machinery by
   addressing it as (TMPL_KEY, 0, bi, mi). Every mutator's renderBuildCanvas()
   call is routed to the template editor while buildSel===TMPL_KEY. By-copy:
   editing here only changes the master; days already stamped are untouched. */
const TMPL_KEY='__tmpl__';
let tmplEditCtx=null;
function openTemplateEditor(name){
  let blocks=[], tag='AM', tname='New session';
  if(name){
    const t=TEMPLATES.find(x=>x.name===name);if(!t)return;
    tname=t.name; tag=t.tag||'AM';
    blocks=Array.isArray(t.blocks)?JSON.parse(JSON.stringify(t.blocks))
          :(t.moves||[]).map(mn=>libClone(mn)).filter(Boolean).map(m=>({type:'move',move:m}));
    tmplEditCtx={origName:t.name};
  }else{ tmplEditCtx={origName:null}; }
  DRAFT[TMPL_KEY]={label:tname,rest:false,note:'',sessions:[{name:tname,tag,blocks}]};
  buildSel=TMPL_KEY;
  closeModal();
  if(!document.getElementById('view-build').classList.contains('active')){
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
    document.getElementById('view-build').classList.add('active');
  }
  document.getElementById('buildNav').innerHTML='';
  document.getElementById('buildDays').innerHTML='';
  renderTemplateEditor();
}
function renderTemplateEditor(){
  const s=DRAFT[TMPL_KEY].sessions[0];
  const c=document.getElementById('buildCanvas');
  let h=`<button class="back-btn" onclick="exitTemplateEditor()">‹ Back to library</button>
    <div class="tmpl-edit-banner">▤ Editing template master — changes apply to future use, not days already built</div>
    <div class="bc-session"><div class="bc-session-head">
      <input value="${(s.name||'').replace(/"/g,'&quot;')}" placeholder="Template name" onchange="setTmplName(this.value)">
      <div class="seg">${['AM','PM','—'].map(t=>`<button class="${s.tag===t?'on':''}" onclick="setTmplTag('${t}')">${t}</button>`).join('')}</div>
    </div><div class="bc-moves">`;
  const nblocks=(s.blocks||[]).length;
  (s.blocks||[]).forEach((b,bi)=>{
    if(b.type==='circuit'){
      const rounds=b.rounds||1;
      h+=`<div class="bc-circuit"><div class="bc-circuit-head"><div class="bcc-name" onclick="editCircuit('${TMPL_KEY}',0,${bi})">⟳ ${escapeHTML(b.name||'Circuit')}</div><div class="bc-reorder">${reorderArrows(`moveBlock('${TMPL_KEY}',0,${bi},-1)`,`moveBlock('${TMPL_KEY}',0,${bi},1)`,bi>0,bi<nblocks-1)}<button class="bc-del" onclick="delBlock('${TMPL_KEY}',0,${bi})">×</button></div></div>
        <div class="bcc-meta">${rounds} round${rounds===1?'':'s'}${b.restBetween?` · ${escapeHTML(b.restBetween)} rest between`:''}</div>
        <div class="bcc-moves">`;
      const nm=(b.moves||[]).length;
      (b.moves||[]).forEach((m,mi)=>{ h+=bcMoveHTML(TMPL_KEY,0,bi,mi,m,mi>0,mi<nm-1); });
      h+=`<button class="bc-add" onclick="openLibrary('${TMPL_KEY}',0,false,${bi})">＋ Add to circuit</button></div></div>`;
    }else if(b.move){
      h+=bcMoveHTML(TMPL_KEY,0,bi,-1,b.move,bi>0,bi<nblocks-1);
    }
  });
  h+=`<div class="bc-add-row"><button class="bc-add" onclick="openLibrary('${TMPL_KEY}',0)">＋ Add move</button><button class="bc-add circuit" onclick="addCircuit('${TMPL_KEY}',0)">⟳ Add circuit</button></div></div></div>`;
  h+=`<button class="bc-save-day" onclick="saveTemplateFromEditor()">${tmplEditCtx&&tmplEditCtx.origName?'Save template':'Create template'}</button>`;
  c.innerHTML=h;
}
function setTmplName(v){DRAFT[TMPL_KEY].sessions[0].name=v;}
function setTmplTag(t){DRAFT[TMPL_KEY].sessions[0].tag=t;renderTemplateEditor();}
async function saveTemplateFromEditor(){
  const s=DRAFT[TMPL_KEY].sessions[0];
  const name=(s.name||'').trim();
  if(!name){toast('Name the template first');return;}
  if(!(s.blocks||[]).length){toast('Add at least one move');return;}
  const tmpl={name,tag:s.tag||'',blocks:JSON.parse(JSON.stringify(s.blocks||[]))};
  let idx=-1;
  if(tmplEditCtx.origName)idx=TEMPLATES.findIndex(t=>t.name===tmplEditCtx.origName);
  if(idx<0)idx=TEMPLATES.findIndex(t=>t.name===name);
  if(idx>=0)TEMPLATES[idx]=tmpl; else TEMPLATES.push(tmpl);
  toast(idx>=0?'Template saved — '+name:'Template created — '+name);
  delete DRAFT[TMPL_KEY]; clearDirty(TMPL_KEY); tmplEditCtx=null; buildSel=null;
  try{ await persistTemplates(); }catch(e){ toast('Saved locally — sync failed'); }
  go('library');
}
function exitTemplateEditor(){
  delete DRAFT[TMPL_KEY]; clearDirty(TMPL_KEY); tmplEditCtx=null; buildSel=null;
  go('library');
}
function persistTemplates(){ return apiPost('plan',{action:'save_templates',metaProjectId:ATHLETE.metaProjectId,templates:TEMPLATES}); }
async function deleteTemplate(name){
  const idx=TEMPLATES.findIndex(t=>t.name===name);if(idx<0)return;
  TEMPLATES.splice(idx,1);
  toast('Template deleted');
  if(typeof renderLibraryTab==='function')renderLibraryTab();
  try{ await persistTemplates(); }catch(e){toast('Sync failed');}
}

function templateListHTML(q,tag){

/* swap / edit moves
   Address scheme: (ds, si, bi, mi). mi===-1 → the block itself is a move-block;
   mi>=0 → the mi-th move inside circuit block bi. moveAt() returns the move object. */
let swapCtx={},editCtx={},circuitCtx={};
function moveAt(ds,si,bi,mi){
  const blk=DRAFT[ds].sessions[si].blocks[bi];
  return mi<0 ? blk.move : blk.moves[mi];
}
function setMoveAt(ds,si,bi,mi,val){
  const blk=DRAFT[ds].sessions[si].blocks[bi];
  if(mi<0)blk.move=val; else blk.moves[mi]=val;
}
function swapMove(ds,si,bi,mi){swapCtx={ds,si,bi,mi};openLibrary(ds,si,true,(mi<0?null:bi));}
/* ── reusable move editor ──────────────────────────────────────────────────
   Renders a full move-edit form (name, category, description, detail lines,
   video) for ANY move object. `onSave(updated)` receives a fresh move built
   from the form; `opts.subtitle` and `opts.renameNote` tune the copy.
   Used for placed moves (in a day), library masters, and template moves. */
let moveEditorSave=null;
function openMoveEditor(move, onSave, opts){
  opts=opts||{};
  moveEditorSave=onSave;
  const specRows=Object.entries(move.spec||{});
  const cats=CATEGORIES;
  let inner=`<div class="modal-grab"></div><h3>Edit move</h3><div class="sub">${escapeHTML(opts.subtitle||'')}</div>

    <div class="mv-edit-field"><label>How to do it / what to watch for (optional)</label><textarea id="emDesc" placeholder="Cue the hinge, flat back, drive through heels. Rest 2 min between heavy sets…">${escapeHTML(move.desc||'')}</textarea></div>
    <div class="mv-edit-field"><label>Detail lines (sets, reps, rest, tempo…)</label></div>
    <div id="specEditRows">${specRows.map((e,i)=>specEditRow(e[0],e[1],i)).join('')}</div>
    <button class="add-set" onclick="addSpecRow()">+ Add detail line</button>
    <div class="mv-edit-field" style="margin-top:14px"><label>Video link (optional)</label><input id="emVideo" value="${(move.video||'').replace(/"/g,'&quot;')}" placeholder="https://…"></div>
    ${opts.renameNote?`<div class="editor-note">${escapeHTML(opts.renameNote)}</div>`:''}
    <div class="modal-actions"><button class="btn" onclick="${opts.onCancel||'closeModal()'}">Cancel</button><button class="btn save" onclick="commitMoveEditor()">Save</button></div>`;
  document.getElementById('modalInner').innerHTML=inner;
  emCatVal=move.cat||cats[0];
  document.getElementById('modalBg').classList.add('show');
}
let emCatVal='Strength';
function emCatPick(el,c){emCatVal=c;[...document.getElementById('emCatRow').children].forEach(x=>x.classList.remove('on'));el.classList.add('on');}
/* read the form into a move object and hand to the registered save callback */
function commitMoveEditor(){
  const name=document.getElementById('emName').value.trim();
  if(!name){toast('Name it first');return;}
  const rows=[...document.querySelectorAll('#specEditRows .spec-edit-row')];
  const spec={};rows.forEach(r=>{const k=r.querySelector('.se-key').value.trim();const v=r.querySelector('.se-val').value.trim();if(k)spec[k]=v;});
  const desc=document.getElementById('emDesc').value.trim();
  const video=document.getElementById('emVideo').value.trim()||null;
  const updated={name,cat:emCatVal,type:emCatVal==='Strength'?'strength':'skill',track:emCatVal==='Strength',spec,video};
  if(desc)updated.desc=desc;
  const cb=moveEditorSave; moveEditorSave=null;
  if(cb)cb(updated);
}

/* placed move (in a day): edit via the shared editor, preserving done-state on rename */
function editMove(ds,si,bi,mi){
  const m=moveAt(ds,si,bi,mi);
  openMoveEditor(m, function(updated){
    const oldName=m.name;
    // keep any fields the editor doesn't manage
    const merged=Object.assign({},m,updated);
    if(!updated.desc)delete merged.desc;
    setMoveAt(ds,si,bi,mi,merged);
    // if the name changed, migrate this move's done-flag so completion isn't orphaned
    if(updated.name!==oldName){
      const full=DAY_CACHE[ds];const sName=DRAFT[ds].sessions[si].name;
      if(full&&full.done){const ok=`${sName}__${oldName}`,nk=`${sName}__${updated.name}`;if(full.done[ok]){full.done[nk]=full.done[ok];delete full.done[ok];}}
    }
    markDirty(ds);closeModal();toast('Move updated');renderBuildCanvas();
  }, {subtitle:(m.cat||'')+' — edit details for '+fmtDate(ds), renameNote:'Renaming makes this a distinct exercise for history/logging on this day.'});
}
function delMove(ds,si,bi,mi){
  const blocks=DRAFT[ds].sessions[si].blocks;
  if(mi<0){ blocks.splice(bi,1); }
  else{ blocks[bi].moves.splice(mi,1); if(!blocks[bi].moves.length)blocks.splice(bi,1); } // empty circuit removes itself
  markDirty(ds);renderBuildCanvas();
}
/* reorder a block (standalone move or whole circuit) within its session */
function moveBlock(ds,si,bi,dir){
  const blocks=DRAFT[ds].sessions[si].blocks;const j=bi+dir;
  if(j<0||j>=blocks.length)return;
  const t=blocks[bi];blocks[bi]=blocks[j];blocks[j]=t;
  markDirty(ds);renderBuildCanvas();
}
/* reorder a move within its circuit */
function moveCircuitMove(ds,si,bi,mi,dir){
  const arr=DRAFT[ds].sessions[si].blocks[bi].moves;const j=mi+dir;
  if(j<0||j>=arr.length)return;
  const t=arr[mi];arr[mi]=arr[j];arr[j]=t;
  markDirty(ds);renderBuildCanvas();
}
/* circuits */
function addCircuit(ds,si){
  DRAFT[ds].sessions[si].blocks=DRAFT[ds].sessions[si].blocks||[];
  DRAFT[ds].sessions[si].blocks.push({type:'circuit',name:'Circuit',rounds:3,restBetween:'',moves:[]});
  markDirty(ds);renderBuildCanvas();
}
function editCircuit(ds,si,bi){
  circuitCtx={ds,si,bi};
  const b=DRAFT[ds].sessions[si].blocks[bi];
  let inner=`<div class="modal-grab"></div><h3>Circuit</h3><div class="sub">Set how the group repeats — per-move sets/reps stay on each move</div>

    <div class="mv-edit-field"><label>Rest between rounds (optional)</label><input id="ccRest" value="${(b.restBetween||'').replace(/"/g,'&quot;')}" placeholder="e.g. 2 min"></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn save" onclick="saveCircuitEdit()">Save</button></div>`;

}
function saveCircuitEdit(){

function delBlock(ds,si,bi){DRAFT[ds].sessions[si].blocks.splice(bi,1);markDirty(ds);renderBuildCanvas();}
function specEditRow(k,v,i){return `<div class="spec-edit-row"><input class="se-key" value="${(k||'').replace(/"/g,'&quot;')}" placeholder="Label (e.g. Sets)"><input class="se-val" value="${(v||'').replace(/"/g,'&quot;')}" placeholder="Value (e.g. 3 × 5)"><button class="rm" onclick="this.parentElement.remove()">×</button></div>`;}
function addSpecRow(){const wrap=document.getElementById('specEditRows');const div=document.createElement('div');div.innerHTML=specEditRow('','',0);wrap.appendChild(div.firstChild);}

/* library picker */
let libCtx={},libCat='All';
function openLibrary(ds,si,isSwap,circuitBi){
  libCtx={ds,si,isSwap:!!isSwap,circuitBi:(typeof circuitBi==='number'?circuitBi:null)};libCat='All';
  let inner=`<div class="modal-grab"></div><h3>${isSwap?'Swap move':(libCtx.circuitBi!=null?'Add to circuit':'Add a move')}</h3><div class="sub">Pick from your library — defaults fill in automatically</div>
    <input class="lib-search" id="libSearch" placeholder="Search exercises…" oninput="filterLib()">
    <div class="cat-tabs" id="catTabs"></div>
    <div id="libList"></div>
    <button class="lib-new" onclick="newExercise()">＋ New exercise (add to library)</button>`;
  document.getElementById('modalInner').innerHTML=inner;
  renderCatTabs();filterLib();
  document.getElementById('modalBg').classList.add('show');
}
function renderCatTabs(){
  const tabs=['All',...CATEGORIES];
  document.getElementById('catTabs').innerHTML=tabs.map(c=>`<button class="${c===libCat?'on':''}" onclick="libCat='${c}';renderCatTabs();filterLib()">${c}</button>`).join('');
}
function filterLib(){
  const q=(document.getElementById('libSearch').value||'').toLowerCase();
  const list=document.getElementById('libList');
  list.innerHTML=libraryListHTML(q,libCat,true);
}
/* shared library list renderer. addable=true shows tap-to-add (picker context);
   always shows edit/delete. Used by the picker and the Library tab. */
function libraryListHTML(q,cat,addable){
  let items=LIBRARY.filter(l=>l.name.toLowerCase().includes((q||'').toLowerCase()));
  if(cat&&cat!=='All')items=items.filter(l=>l.cat===cat);
  let html='';
  CATEGORIES.forEach(c=>{
    const inCat=items.filter(l=>l.cat===c);
    if(!inCat.length)return;
    if(!cat||cat==='All')html+=`<div class="lib-cat-h">${c}</div>`;
    html+=inCat.map(l=>{
      const sub=Object.values(l.spec||{}).slice(0,2).join(' · ')||l.type||'';
      return `<div class="lib-item">
        <div class="li-main" ${addable?`onclick="pickLib('${esc(l.name)}')"`:`onclick="editLibraryMove('${esc(l.name)}')"`}>
          <div class="li-name">${escapeHTML(l.name)}</div><div class="li-sub">${escapeHTML(sub)}${l.desc?' · ✎':''}</div>
        </div>
        <div class="li-actions">
          <button class="li-edit" onclick="event.stopPropagation();editLibraryMove('${esc(l.name)}')">edit</button>
          <button class="li-del" onclick="event.stopPropagation();deleteLibraryMove('${esc(l.name)}')">×</button>
        </div></div>`;
    }).join('');
  });
  return html||'<div class="empty-hint">No match'+(addable?' — add it as new below.':'.')+'</div>';
}
function persistLibrary(){ return apiPost('plan',{action:'save_library',metaProjectId:ATHLETE.metaProjectId,library:LIBRARY}); }
/* edit a library master via the shared move editor; affects future adds only */
function editLibraryMove(name){
  const idx=LIBRARY.findIndex(l=>l.name===name);if(idx<0)return;
  openMoveEditor(LIBRARY[idx], async function(updated){
    if(updated.name!==name && LIBRARY.some((l,i)=>i!==idx&&l.name===updated.name)){toast('A library move already has that name');return;}
    LIBRARY[idx]=Object.assign({},LIBRARY[idx],updated);
    if(!updated.desc)delete LIBRARY[idx].desc;
    closeModal();toast('Library updated');
    refreshLibraryViews();
    try{ await persistLibrary(); }catch(e){toast('Sync failed');}
  }, {subtitle:'Library master — changes apply to moves added from now on', renameNote:'Editing the library does not change moves already placed in days.', onCancel:'reopenLibraryContext()'});
}
async function deleteLibraryMove(name){
  const idx=LIBRARY.findIndex(l=>l.name===name);if(idx<0)return;
  LIBRARY.splice(idx,1);
  toast('Removed from library');
  refreshLibraryViews();
  try{ await persistLibrary(); }catch(e){toast('Sync failed');}
}
/* re-render whichever library surface is open (picker modal or Library tab) */
function refreshLibraryViews(){
  if(document.getElementById('libList'))filterLib();
  if(typeof renderLibraryTab==='function' && document.getElementById('view-library') && document.getElementById('view-library').classList.contains('active'))renderLibraryTab();
}
/* after editing/deleting from inside the picker, redisplay the picker */
function reopenLibraryContext(){
  if(document.getElementById('view-library')&&document.getElementById('view-library').classList.contains('active')){closeModal();renderLibraryTab&&renderLibraryTab();}
  else if(libCtx&&libCtx.ds!=null)openLibrary(libCtx.ds,libCtx.si,libCtx.isSwap,libCtx.circuitBi);
  else closeModal();
}
function pickLib(name){
  const tpl=libClone(name);if(!tpl)return;
  let dirtyDs;
  if(libCtx.isSwap&&swapCtx.ds!=null){
    setMoveAt(swapCtx.ds,swapCtx.si,swapCtx.bi,swapCtx.mi,tpl);dirtyDs=swapCtx.ds;swapCtx={};
  }else{
    addMoveToTarget(libCtx,tpl);dirtyDs=libCtx.ds;
  }
  markDirty(dirtyDs);closeModal();toast((libCtx.isSwap?'Swapped to ':'Added — ')+name);renderBuildCanvas();
}
/* push a move either into a circuit (libCtx.circuitBi set) or as a new standalone block */
function addMoveToTarget(ctx,move){
  const blocks=DRAFT[ctx.ds].sessions[ctx.si].blocks=DRAFT[ctx.ds].sessions[ctx.si].blocks||[];
  if(ctx.circuitBi!=null && blocks[ctx.circuitBi] && blocks[ctx.circuitBi].type==='circuit'){
    blocks[ctx.circuitBi].moves.push(move);
  }else{
    blocks.push({type:'move',move:move});
  }
}
let neCat='Strength';
function newExercise(){
  let inner=`<div class="modal-grab"></div><h3>New exercise</h3><div class="sub">Adds to your library. Category sets how it logs — Strength tracks reps/weight, others are notes.</div>
    <div class="mv-edit-field"><label>Name</label><input id="neName" placeholder="e.g. Hang Clean"></div>
    <div class="mv-edit-field"><label>Category</label></div>
    <div class="mv-toggle-row" id="neCatRow">${CATEGORIES.map((c,i)=>`<div class="mvt ${i===0?'on':''}" onclick="neCatPick(this,'${c}')">${c}</div>`).join('')}</div>
    <div class="mv-edit-field"><label>Sets / reps (optional)</label><input id="neSets" placeholder="e.g. 3 × 5"></div>
    <div class="mv-edit-field"><label>Video link (optional)</label><input id="neVideo" placeholder="https://…"></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn save" onclick="saveNewExercise()">Add</button></div>`;
  document.getElementById('modalInner').innerHTML=inner;neCat='Strength';
}
function neCatPick(el,c){neCat=c;[...document.getElementById('neCatRow').children].forEach(x=>x.classList.remove('on'));el.classList.add('on');}
async function saveNewExercise(){
  const name=document.getElementById('neName').value.trim();if(!name){toast('Name it first');return;}
  const sets=document.getElementById('neSets').value.trim();const video=document.getElementById('neVideo').value.trim()||null;
  const spec={};if(sets)spec.Sets=sets;
  const ex={name,cat:neCat,type:neCat==='Strength'?'strength':'skill',track:neCat==='Strength',video,spec};
  LIBRARY.push(ex);
  addMoveToTarget(libCtx,JSON.parse(JSON.stringify(ex)));
  markDirty(libCtx.ds);closeModal();toast('Added to library + day');renderBuildCanvas();
  try{ await apiPost('plan',{action:'save_library',metaProjectId:ATHLETE.metaProjectId,library:LIBRARY}); }catch(e){toast('Library sync failed');}
}

/* draft mutators */
function toggleRest(ds){DRAFT[ds].rest=!DRAFT[ds].rest;if(DRAFT[ds].rest)DRAFT[ds].sessions=[];markDirty(ds);renderBuildCanvas();}
function addSession(ds){DRAFT[ds].sessions=DRAFT[ds].sessions||[];const tag=DRAFT[ds].sessions.length===0?'AM':'PM';DRAFT[ds].sessions.push({tag,name:'',blocks:[]});markDirty(ds);renderBuildCanvas();}
function delSession(ds,si){DRAFT[ds].sessions.splice(si,1);markDirty(ds);renderBuildCanvas();}
function setSessName(ds,si,v){DRAFT[ds].sessions[si].name=v;markDirty(ds);}
function setSessTag(ds,si,t){DRAFT[ds].sessions[si].tag=t;markDirty(ds);renderBuildCanvas();}

/* derive badges + label and assemble the day payload from a draft (pure) */
function buildDayPayload(ds,draft){
  let badges=[];
  if(draft.rest){badges=['Rest'];}
  else{(draft.sessions||[]).forEach(s=>{const n=(s.name||'').toLowerCase();if(n.includes('strength'))badges.push('Strength');if(n.includes('charlotte'))badges.push('Charlotte');if(n.includes('cape'))badges.push('Cape');if(n.includes('sarasota'))badges.push('Sarasota');if(n.includes('sprint'))badges.push('Sprints');if(n.includes('roller'))badges.push('Roller');});
    (draft.sessions||[]).forEach(s=>sessionMoves(s).forEach(m=>{if(m.cat==='Strength')badges.push('Strength');if(m.cat==='Roller')badges.push('Roller');if(m.cat==='Sprints')badges.push('Sprints');}));
  }
  if(!badges.length)badges=['Strength'];
  badges=[...new Set(badges)];
  const label=draft.rest?'Rest':sortSessionsForDisplay(draft.sessions).map(s=>s.name).filter(Boolean).join(' + ')||'Training';
  return {date:ds,label,badges,rest:!!draft.rest,note:draft.rest?(draft.note||'Rest day'):'',sessions:draft.rest?[]:(draft.sessions||[])};
}
/* update local summaries + cache after a successful save */
function commitDayLocal(ds,day){
  DAYS[ds]={gid:null,date:ds,label:day.label,badges:day.badges,rest:day.rest,note:day.note,skipped:(DAY_CACHE[ds]?DAY_CACHE[ds].skipped:{})||{},done:(DAY_CACHE[ds]?DAY_CACHE[ds].done:{})||{},feedback:(DAY_CACHE[ds]?DAY_CACHE[ds].feedback:'')||''};
  DAY_CACHE[ds]=Object.assign({},DAYS[ds],{sessions:day.sessions});
}
/* persist one day to the server; throws on failure so callers can roll back */
async function persistDay(ds,draft){
  const day=buildDayPayload(ds,draft);
  await apiPost('plan',{action:'save_day',planProjectId:ATHLETE.planProjectId,day});
  commitDayLocal(ds,day);
  clearDirty(ds);
  return day;
}

/* save the day to the server (single-day, from the Save button) */
async function saveDay(ds){
  toast('Saving…');
  try{
    await persistDay(ds,DRAFT[ds]);
    toast('Saved — '+fmtDate(ds)+' is live on the calendar');
    renderBuild();
  }catch(e){ toast('Save failed — try again'); }
}

/* ── move a session to another day in the current build week ── */
let moveCtx={};
function openMoveSession(ds,si){
  moveCtx={ds,si};
  const s=DRAFT[ds].sessions[si];
  const ws=parseISO(buildWeekStart);
  // the other six days of the displayed week
  let rows='';
  for(let i=0;i<7;i++){
    const d=new Date(ws);d.setDate(ws.getDate()+i);const tds=iso(d);
    if(tds===ds)continue;
    const plan=DAYS[tds];
    const sub=plan?(plan.rest?'Rest day':escapeHTML(plan.label||'Has plan')):'No plan yet';
    rows+=`<div class="lib-item" onclick="moveSessionToDay('${tds}')"><div><div class="li-name">${DOW[d.getDay()]} · ${MO[d.getMonth()].slice(0,3)} ${d.getDate()}</div><div class="li-sub">${sub}</div></div><span class="li-type tt-strength">→</span></div>`;
  }
  let inner=`<div class="modal-grab"></div><h3>Move session</h3><div class="sub">“${escapeHTML(s.name||'Session')}” → pick a day this week. Both days save automatically.</div>${rows}`;
  document.getElementById('modalInner').innerHTML=inner;
  document.getElementById('modalBg').classList.add('show');
}
async function moveSessionToDay(targetDs){
  const srcDs=moveCtx.ds, si=moveCtx.si;
  if(targetDs===srcDs){closeModal();return;}
  closeModal();toast('Moving…');
  // make sure both day drafts are hydrated before we mutate them
  await ensureDraft(srcDs); await ensureDraft(targetDs);
  const srcDraft=DRAFT[srcDs], tgtDraft=DRAFT[targetDs];
  const session=srcDraft.sessions[si];
  if(!session){toast('Session not found');return;}
  // snapshot for rollback
  const srcSnap=JSON.parse(JSON.stringify(srcDraft.sessions));
  const tgtSnap=JSON.parse(JSON.stringify({sessions:tgtDraft.sessions,rest:tgtDraft.rest}));
  // apply the move in memory
  srcDraft.sessions.splice(si,1);
  tgtDraft.sessions=tgtDraft.sessions||[];
  tgtDraft.sessions.push(JSON.parse(JSON.stringify(session)));
  if(tgtDraft.rest)tgtDraft.rest=false; // moving work into a rest day un-rests it
  try{
    // persist target first (gains the session), then source (loses it).
    await persistDay(targetDs,tgtDraft);
    let targetCommitted=true;
    try{
      await persistDay(srcDs,srcDraft);
    }catch(srcErr){
      // source failed but target already saved on the server — undo the target
      // save so we don't leave a duplicate, then roll back memory.
      tgtDraft.sessions=tgtSnap.sessions; tgtDraft.rest=tgtSnap.rest;
      try{ await persistDay(targetDs,tgtDraft); }catch(e2){ /* best-effort */ }
      throw srcErr;
    }
    toast('Moved to '+fmtDate(targetDs)+' — both days saved');
    renderBuild();
  }catch(e){
    srcDraft.sessions=srcSnap; tgtDraft.sessions=tgtSnap.sessions; tgtDraft.rest=tgtSnap.rest;
    toast('Move failed — nothing changed');
    renderBuild();
  }
}

/* ════ EVENTS ════ */
let evType='race',evCopyTo={};
let eventEditorReturn=null;
function openEventEditor(ds,returnTo){
  eventEditorReturn=returnTo||null;
  const startDate=ds||TODAY;
  evType='race';evCopyTo={};evCopyTo[ATHLETE.id]=true;
  // athletes the coach/parent can copy to (coach sees all; parent sees their guarded set)
  const others=SESSION.athletes;
  let inner=`<div class="modal-grab"></div><h3>Add event</h3><div class="sub">Races, travel, camps — context the plan works around</div>
    <div class="mv-edit-field"><label>Type</label></div>
    <div class="mv-toggle-row" id="evTypeRow">${Object.keys(EVENT_TYPES).map((k)=>`<div class="mvt ${k==='race'?'on':''}" onclick="evTypePick(this,'${k}')">${EVENT_TYPES[k].label}</div>`).join('')}</div>
    <div class="mv-edit-field"><label>Title</label><input id="evTitle" placeholder="e.g. State Championship — Orlando"></div>
    <div class="mv-edit-field"><label>Start date</label><input id="evStart" type="date" value="${startDate}"></div>
    <div class="mv-edit-field"><label>End date (optional, for multi-day)</label><input id="evEnd" type="date" value=""></div>
    ${others.length>1?`<div class="mv-edit-field"><label>Copy to athletes (shared events)</label></div>
    <div class="copy-all" id="copyAll" onclick="toggleCopyAll()"><span class="ca-check" id="copyAllCheck"></span>Select all athletes</div>
    <div class="copy-athletes" id="copyAthletes">${others.map(a=>`<div class="ca-item ${a.id===ATHLETE.id?'on':''}" data-aid="${a.id}" onclick="toggleCopy(this,'${a.id}')"><span class="ca-check">${a.id===ATHLETE.id?'✓':''}</span>${escapeHTML(a.name)}</div>`).join('')}</div>`:''}
    <div class="modal-actions"><button class="btn" onclick="${eventEditorReturn==='avail'?'openAvailability()':'closeModal()'}">Cancel</button><button class="btn save" onclick="saveEvent()">Add event</button></div>`;
  document.getElementById('modalInner').innerHTML=inner;
  document.getElementById('modalBg').classList.add('show');
}
function evTypePick(el,k){evType=k;[...document.getElementById('evTypeRow').children].forEach(x=>x.classList.remove('on'));el.classList.add('on');}
function toggleCopy(el,id){evCopyTo[id]=!evCopyTo[id];el.classList.toggle('on',evCopyTo[id]);el.querySelector('.ca-check').textContent=evCopyTo[id]?'✓':'';syncCopyAll();}
function toggleCopyAll(){const others=SESSION.athletes;const all=others.every(a=>evCopyTo[a.id]);const next=!all;others.forEach(a=>{evCopyTo[a.id]=next;});[...document.getElementById('copyAthletes').children].forEach(el=>{el.classList.toggle('on',next);el.querySelector('.ca-check').textContent=next?'✓':'';});syncCopyAll();}
function syncCopyAll(){const others=SESSION.athletes;const all=others.every(a=>evCopyTo[a.id]);const c=document.getElementById('copyAllCheck');if(c){c.textContent=all?'✓':'';document.getElementById('copyAll').classList.toggle('on',all);}}
/* refresh whatever surface is showing after an event add/remove */
function refreshAfterEvent(){
  const active=id=>{const el=document.getElementById('view-'+id);return el&&el.classList.contains('active');};
  if(active('build'))renderBuild();
  if(active('cal')){renderCal();renderWeek&&renderWeek();}
  if(active('day')&&selDate)openDay(selDate);
  renderHome&&renderHome();
}
async function saveEvent(){
  const title=document.getElementById('evTitle').value.trim();if(!title){toast('Give it a title');return;}
  const start=document.getElementById('evStart').value, end=document.getElementById('evEnd').value||null;
  if(!start){toast('Pick a date');return;}
  const targets=Object.keys(evCopyTo).filter(k=>evCopyTo[k]);
  const shared=targets.length>1;
  const backToAvail=eventEditorReturn==='avail';
  closeModal();toast('Saving event…');
  // add to current athlete locally, stamped with who created it
  const ev={id:eventId++,date:start,end,type:evType,title,shared,createdBy:ROLE};
  EVENTS.push(ev);
  refreshAfterEvent();
  // persist to each targeted athlete's meta project
  try{
    for(const aid of targets){
      const a=SESSION.athletes.find(x=>x.id===aid);if(!a)continue;
      if(aid===ATHLETE.id){
        await apiPost('plan',{action:'save_events',metaProjectId:a.metaProjectId,events:EVENTS});
      }else{
        // read that athlete's events, append, write back
        const r=await apiGet('plan',{action:'events',metaProjectId:a.metaProjectId});
        const list=(r.events||[]);const nid=list.reduce((m,e)=>Math.max(m,e.id||0),0)+1;
        list.push({id:nid,date:start,end,type:evType,title,shared:true,createdBy:ROLE});
        await apiPost('plan',{action:'save_events',metaProjectId:a.metaProjectId,events:list});
      }
    }
    toast(shared?`Event added + copied to ${targets.length} athletes`:'Event added');
  }catch(e){ toast('Event saved locally — sync failed'); }
  if(backToAvail){eventEditorReturn=null;openAvailability();}
}
async function delEvent(id){
  const ev=EVENTS.find(e=>e.id===id);
  // riders/parents may only delete events they created; coach can delete anything
  if(ev && ROLE!=='coach' && (ev.createdBy||'coach')==='coach'){ toast("That's a coach event — ask coach to remove it"); return; }
  const backToAvail=eventEditorReturn==='avail';
  EVENTS=EVENTS.filter(e=>e.id!==id);
  refreshAfterEvent();toast('Event removed');
  try{ await apiPost('plan',{action:'save_events',metaProjectId:ATHLETE.metaProjectId,events:EVENTS}); }catch(e){toast('Sync failed');}
  if(backToAvail){eventEditorReturn=null;openAvailability();}
}
